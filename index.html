<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner settlement · 13‑month ledger</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f9ff;
            color: #1b3347;
            padding: 1.2rem 1.8rem;
        }
        .app {
            max-width: 1500px;
            margin: 0 auto;
        }
        /* executive summary panel – bottom position (but we keep at top as requested? actually we add both: sticky top and also final bottom block */
        .executive-sticky {
            position: sticky;
            top: 0.6rem;
            z-index: 40;
            background: #ffffffec;
            backdrop-filter: blur(6px);
            border: 1px solid #cfddee;
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 12px 24px -16px #1e3f60;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1.2rem 2.5rem;
        }
        .stat-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #3f627f;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: 630;
            color: #0a2f48;
        }
        /* main layout */
        .grid-dash {
            display: flex;
            gap: 2rem;
        }
        .sidebar {
            width: 230px;
            flex-shrink: 0;
            background: white;
            border-radius: 30px;
            padding: 1.8rem 0.5rem;
            position: sticky;
            top: 5.5rem;
            height: fit-content;
            border: 1px solid #dae5f0;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.65rem 1.2rem;
            margin: 0.2rem 0.5rem;
            border-radius: 40px;
            color: #1e3f5c;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 460;
        }
        .sidebar a:hover {
            background: #e4effa;
            color: #0c3f64;
        }
        .main {
            flex: 1;
            min-width: 0;
        }
        section {
            scroll-margin-top: 5rem;
            background: white;
            border-radius: 28px;
            padding: 1.8rem 2rem;
            margin-bottom: 2.2rem;
            border: 1px solid #dce9f2;
            box-shadow: 0 8px 22px -12px #1f3b57;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 580;
            color: #133755;
            border-bottom: 2px solid #c9ddec;
            padding-bottom: 0.6rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h3 {
            color: #1a4b72;
            font-size: 1.1rem;
            margin: 1.2rem 0 0.4rem 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0, 20, 30, 0.04);
        }
        th {
            background: #e7f0f9;
            color: #103b58;
            font-weight: 540;
            padding: 0.7rem 0.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }
        td {
            padding: 0.6rem 0.4rem;
            border-bottom: 1px solid #e0ebf5;
        }
        td[contenteditable="true"] {
            background: #fbfeff;
            border: 1px solid transparent;
            border-radius: 8px;
            outline: none;
        }
        td[contenteditable="true"]:focus {
            border-color: #3080c7;
            background: #ffffff;
        }
        .amount-cell {
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 470;
        }
        tfoot td {
            background: #f3f9ff;
            font-weight: 620;
            border-top: 2px solid #c1d6ed;
        }
        .btn-sm {
            background: white;
            border: 1px solid #b6cde2;
            border-radius: 40px;
            padding: 0.25rem 1.2rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-sm:hover {
            background: #e2effb;
        }
        .btn-icon {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #4f6f8f;
        }
        .btn-icon:hover { color: #c0392b; }
        .editable-block {
            background: #f6fcff;
            border: 1px dashed #7ba9d1;
            border-radius: 24px;
            padding: 1.2rem 1.8rem;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 1rem 0;
        }
        .total-badge {
            background: #e3effa;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            display: inline-block;
            font-size: 0.9rem;
            font-weight: 520;
            margin-top: 0.5rem;
        }
        .print-only { display: none; }
        @media print {
            .sidebar, .btn-sm, .btn-icon { display: none; }
            body { background: white; }
            section { break-inside: avoid; border: 1px solid #aaa; }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- sticky summary (existing, keeps totals) -->
    <div class="executive-sticky" id="stickyExec"></div>

    <div class="grid-dash">
        <!-- sidebar navigation -->
        <div class="sidebar print-hide">
            <a href="#exec">📋 Exec summary</a>
            <a href="#office">🪑 1. Office setup</a>
            <a href="#rentutil">🏢 2. Rent+util</a>
            <a href="#salaries">👥 3. Salaries</a>
            <a href="#car">🚗 4. Car expense</a>
            <a href="#personal">👤 5. Personal (A,S,H)</a>
            <a href="#hammad">🧑 6. Hammad cost</a>
            <a href="#food">🍲 7. Pooled food</a>
            <a href="#trading">📊 8. Trading</a>
            <a href="#capital">💰 9. Capital</a>
            <a href="#matrix">🔗 10. Matrix</a>
            <a href="#settlement">⚖️ 11. Direction</a>
            <a href="#insight">💡 12. Core insight</a>
            <a href="#confirm">✅ 13. Confirm items</a>
        </div>

        <!-- main content -->
        <div class="main" id="mainContent"></div>
    </div>
</div>

<script>
    (function() {
        // ----- PRELOAD DATA (exact as described) -----
        let store = {
            // executive text for bottom block (section 0 we also embed at top via sticky)
            execFull: `EXECUTIVE SUMMARY

Period: Jan-2025 → Feb-2026

Total cash inflow into system
≈ 6.0M–6.8M

Core business operating cost
≈ 3.9M

Non-business extraction
≈ 5.6M

Key conclusion:

The training business itself was profitable.
The deficit was created by personal withdrawals, vehicle, pooled living costs, and trading loss.

Primary capital provider: Hasan
Primary cash operator: Arslan
Secondary withdrawal: Shahzad
Employee: Hammad

Business owes Hasan.
Arslan and Shahzad owe business.`,

            // 1. OFFICE
            office: [
                {date:'17-Jan-2025', item:'Office rent advance setup', amount:90500},
                {date:'21-Jan-2025', item:'Table + chair', amount:81000},
                {date:'27-Jan-2025', item:'Staff tables', amount:57000},
                {date:'27-Jan-2025', item:'Fans', amount:20000},
                {date:'10-Feb-2025', item:'Laptop', amount:95000},
                {date:'10-Feb-2025', item:'Camera', amount:10000},
                {date:'11-Feb-2025', item:'Opening items', amount:16800},
                {date:'11-Feb-2025', item:'Table materials', amount:3600},
                {date:'12-Feb-2025', item:'Electrical items', amount:7300},
                {date:'18-Feb-2025', item:'Glass partition', amount:180000},
                {date:'12-Mar-2025', item:'Projector', amount:70000},
                {date:'04-Apr-2025', item:'Dispenser', amount:33000},
                {date:'05-Apr-2025', item:'UPS battery', amount:38000},
                {date:'06-Apr-2025', item:'Curtains', amount:12000},
                {date:'09-Apr-2025', item:'Systems + LCD + printer + screen', amount:192000},
                {date:'09-Apr-2025', item:'Standies + stamp', amount:7000},
                {date:'12-Apr-2025', item:'Blinds', amount:25000},
                {date:'21-Apr-2025', item:'Sofa + cupboard', amount:16500},
                {date:'14-Oct-2025', item:'PC + accessories', amount:10700},
                {date:'08-Jan-2026', item:'UPS repair', amount:5000}
            ],
            // 2. RENT (three summary rows)
            rent: [
                {period:'Jan-2025 office', amount:90500},
                {period:'Feb-Apr bundle', amount:185000},
                {period:'Monthly avg May-Feb (office+rooms)', amount:1300000} // composite
            ],
            utilities: [
                {desc:'Electric + PTCL + internet', amount:445000} // approx
            ],
            // 3. SALARIES
            salaries: [
                {person:'Rida salary', amount:220000},
                {person:'Office boys', amount:140000},
                {person:'Hammad allowance (78k+45k)', amount:120000}
            ],
            // 4. CAR expense (preload)
            car: [
                {desc:'Rameez installments', amount:520000},
                {desc:'Fuel cumulative', amount:420000},
                {desc:'Repairs + oil + fines', amount:120000}
            ],
            // 5. PERSONAL (three partners)
            personalArslan: [
                {date:'28-Apr-2025', desc:'160k use', amount:160000},
                {date:'Aug–Feb', desc:'various 10k-50k', amount:600000},
                {date:'Jan-2026', desc:'wedding 30k', amount:30000},
                {date:'Feb-2026', desc:'220k Rameez+personal', amount:220000}
            ],
            personalShahzad: [
                {date:'29-Apr-2025', desc:'personal 100k', amount:100000},
                {date:'Aug-Nov', desc:'18k–35k entries', amount:120000},
                {date:'Nov', desc:'shopping+salon+clothing', amount:80000},
                {date:'Feb-2026', desc:'home 30k', amount:30000}
            ],
            personalHasan: [
                {date:'various', desc:'home medicine small', amount:50000}
            ],
            // 6. Hammad policy text (editable)
            hammadText: `Policy: Jan–Aug fuel 6k/month = 48k ; Sep–Feb food 15k/month = 90k → total expected 138k

Ledger actual ≈ 120k–140k. Difference negligible.

Conclusion: Hammad correct employee cost.`,
            // 7. POOLED FOOD
            pooledFood: [
                {date:'daily', desc:'staff meals, boys meals, tea, juice, guest food', amount:1400000} // approx total
            ],
            // 8. TRADING
            trading: [
                {desc:'Exeness loss', amount:1500000},
                {desc:'Later profits entered pool', amount:1200000}
            ],
            // 9. CAPITAL
            capital: [
                {partner:'Hasan', amount:2280000},
                {partner:'Arslan', amount:805000},
                {partner:'Shahzad', amount:560000},
                {partner:'Other small', amount:0}
            ],
            // 10. accountability matrix as text (static but we show)
            matrixRows: [
                ['Office setup','Hasan funded'],
                ['Business rent/utilities','Business'],
                ['Salaries','Business'],
                ['Vehicle','Arslan'],
                ['Trading loss','Arslan'],
                ['Pooled food system','Arslan operated'],
                ['Shahzad personal','Shahzad'],
                ['Arslan personal','Arslan'],
                ['Hammad','Employee cost'],
                ['Capital provided','Hasan']
            ],
            // 11. settlement direction
            settlementText: `Business owes Hasan large capital.

Arslan owes business (personal + vehicle + trading extraction).

Shahzad owes business (personal withdrawals).

Hammad neutral.`,
            // 12. core insight
            insightText: `If personal + vehicle + pooled food + trading were removed:

Business profit retained ≈ 2M+.

So business viable. Loss caused by withdrawals structure.`,
            // 13. confirmation items (editable block)
            confirmText: `ITEMS NEEDED TO FINALIZE EXACT NUMBERS

1. Exact total paid to Rameez for car across year
2. Whether any Arslan trading profit kept outside ledger
3. Confirmation that 454,040 Shahzad entry earlier is true funding
4. Whether any Hasan withdrawals missing

With these four confirmations I can produce final rupee balances per partner, who owes whom exact.`
        };

        // ------ helpers -----
        function formatMoney(amt) { return '₨ ' + Number(amt).toLocaleString('en-PK',{maximumFractionDigits:0}); }
        function sum(arr, key) { return arr.reduce((a,b)=>a+Number(b[key]||b.amount),0); }

        function computeTotals() {
            return {
                office: sum(store.office,'amount'),
                rent: sum(store.rent,'amount'),
                util: sum(store.utilities,'amount'),
                salary: sum(store.salaries,'amount'),
                car: sum(store.car,'amount'),
                arslanP: sum(store.personalArslan,'amount'),
                shahzadP: sum(store.personalShahzad,'amount'),
                hasanP: sum(store.personalHasan,'amount'),
                food: sum(store.pooledFood,'amount'),
                trading: sum(store.trading,'amount'),
                capital: sum(store.capital,'amount')
            };
        }

        function updateSticky() {
            let t = computeTotals();
            let inflow = t.capital;
            let core = t.rent + t.util + t.salary;
            let nonBus = t.arslanP + t.shahzadP + t.hasanP;
            document.getElementById('stickyExec').innerHTML = `
                <div><span class="stat-badge">📅 Period</span><div class="stat-value">Jan25–Feb26</div></div>
                <div><span class="stat-badge">💰 Inflow</span><div class="stat-value">${formatMoney(inflow)}</div></div>
                <div><span class="stat-badge">🏭 Core cost</span><div class="stat-value">${formatMoney(core)}</div></div>
                <div><span class="stat-badge">📤 Non‑bus extr</span><div class="stat-value">${formatMoney(nonBus)}</div></div>
                <button class="btn-sm" id="printBtn">🖨️ PDF</button>
            `;
            document.getElementById('printBtn')?.addEventListener('click', ()=>window.print());
        }

        // ----- RENDER FULL PAGE -----
        function render() {
            let t = computeTotals();
            let html = '';

            // 0. EXECUTIVE SUMMARY (detailed block at bottom? we'll place at top as first section but also keep sticky – we follow request: show full exec at bottom as well, but we add it as section 0)
            html += `<section id="exec"><h2>📋 EXECUTIVE SUMMARY</h2>`;
            html += `<div class="editable-block" style="font-size:1rem;" contenteditable="true" id="execFullBlock">${store.execFull}</div></section>`;

            // 1. OFFICE
            html += `<section id="office"><h2>🪑 1. OFFICE SETUP & EQUIPMENT (CAPEX)</h2>${renderOffice()}`;
            html += `<div class="total-badge">TOTAL OFFICE CAPEX ≈ 890k–930k — current sum: ${formatMoney(t.office)}</div>`;
            html += `<p><strong>Accountability:</strong> Business investment funded mostly by Hasan.</p></section>`;

            // 2. RENT + UTILITIES
            html += `<section id="rentutil"><h2>🏢 2. RENT + UTILITIES</h2>`;
            html += `<h3>Rent</h3>${renderRent()}<h3>Utilities</h3>${renderUtil()}`;
            html += `<div class="total-badge">Total rent ≈ 1.55–1.65M | Utilities ≈ 420k–470k | Combined: ${formatMoney(t.rent+t.util)}</div>`;
            html += `<p><strong>Accountability:</strong> Business operating cost.</p></section>`;

            // 3. SALARIES
            html += `<section id="salaries"><h2>👥 3. SALARIES & STAFF COST</h2>${renderSalaries()}`;
            html += `<div class="total-badge">Total ≈ 480k–520k — ${formatMoney(t.salary)}</div>`;
            html += `<p><strong>Accountability:</strong> Business.</p></section>`;

            // 4. CAR
            html += `<section id="car"><h2>🚗 4. CAR EXPENSE (FULL)</h2>${renderCar()}`;
            html += `<div class="total-badge">Total vehicle cost ≈ 1.05M–1.15M — ${formatMoney(t.car)}</div>`;
            html += `<p><strong>Accountability:</strong> Primarily Arslan usage.</p></section>`;

            // 5. PERSONAL (three)
            html += `<section id="personal"><h2>👤 5. PERSONAL EXPENSE BY PERSON</h2>`;
            html += `<div style="display:flex; flex-wrap:wrap; gap:2rem;"><div><h3>Arslan personal</h3>${renderPersonal('arslan')}<div class="total-badge">${formatMoney(t.arslanP)} (900k–1.1M)</div><p>Accountability: Arslan.</p></div>`;
            html += `<div><h3>Shahzad personal</h3>${renderPersonal('shahzad')}<div class="total-badge">${formatMoney(t.shahzadP)} (280k–340k)</div><p>Accountability: Shahzad.</p></div>`;
            html += `<div><h3>Hasan personal</h3>${renderPersonal('hasan')}<div class="total-badge">${formatMoney(t.hasanP)} (40k–60k)</div><p>Accountability: Hasan.</p></div>`;
            html += `</div></section>`;

            // 6. HAMMAD
            html += `<section id="hammad"><h2>🧑 6. HMAD COST (CORRECTED)</h2>`;
            html += `<div class="editable-block" contenteditable="true" id="hammadBlock">${store.hammadText}</div>`;
            html += `<p><strong>Conclusion:</strong> Hammad correct employee cost.</p></section>`;

            // 7. POOLED FOOD
            html += `<section id="food"><h2>🍲 7. POOLED FOOD / LIVING SYSTEM</h2>${renderFood()}`;
            html += `<div class="total-badge">13 months total ≈ 1.3M–1.45M — ${formatMoney(t.food)}</div>`;
            html += `<p><strong>Accountability:</strong> Shared living system, mostly operated by Arslan.</p></section>`;

            // 8. TRADING
            html += `<section id="trading"><h2>📊 8. TRADING</h2>${renderTrading()}`;
            html += `<div class="total-badge">Net loss ${formatMoney(t.trading)} (excess loss 1.5M – profit 1.2M entered pool)</div>`;
            html += `<p><strong>Accountability:</strong> Trading operator Arslan.</p></section>`;

            // 9. CAPITAL
            html += `<section id="capital"><h2>💰 9. CAPITAL CONTRIBUTION</h2>${renderCapital()}`;
            html += `<div class="total-badge">Total ≈ 3.6M — ${formatMoney(t.capital)}</div></section>`;

            // 10. ACCOUNTABILITY MATRIX
            html += `<section id="matrix"><h2>🔗 10. FINAL ACCOUNTABILITY MATRIX</h2>`;
            html += `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; background:#f6faff; padding:1.4rem; border-radius:20px;">`;
            store.matrixRows.forEach(r=> html+=`<div><span style="font-weight:500;">${r[0]}</span> — <span style="color:#0f4975;">${r[1]}</span></div>`);
            html += `</div></section>`;

            // 11. SETTLEMENT DIRECTION
            html += `<section id="settlement"><h2>⚖️ 11. SETTLEMENT DIRECTION</h2>`;
            html += `<div class="editable-block" contenteditable="true" id="settlementBlock">${store.settlementText}</div></section>`;

            // 12. CORE INSIGHT
            html += `<section id="insight"><h2>💡 12. CORE INSIGHT FOR HASAN</h2>`;
            html += `<div class="editable-block" contenteditable="true" id="insightBlock">${store.insightText}</div></section>`;

            // 13. CONFIRM ITEMS
            html += `<section id="confirm"><h2>✅ 13. ITEMS NEEDED TO FINALIZE</h2>`;
            html += `<div class="editable-block" contenteditable="true" id="confirmBlock">${store.confirmText}</div></section>`;

            document.getElementById('mainContent').innerHTML = html;

            // attach events
            attachEvents();
            updateSticky();
            saveBlocksOnBlur();
        }

        // ---- table render helpers ----
        function renderOffice() {
            let rows = store.office.map((r,i)=>`<tr><td contenteditable="true" data-table="office" data-field="date" data-row="${i}">${r.date}</td><td contenteditable="true" data-table="office" data-field="item" data-row="${i}">${r.item}</td><td class="amount-cell" contenteditable="true" data-table="office" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="office" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="office">➕ Add row</button></div><table><thead><tr><th>Date</th><th>Item</th><th>Amount</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
        }
        function renderRent() {
            let rows = store.rent.map((r,i)=>`<tr><td contenteditable="true" data-table="rent" data-field="period" data-row="${i}">${r.period}</td><td class="amount-cell" contenteditable="true" data-table="rent" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="rent" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="rent">➕ Add</button></div><table><tr><th>Period</th><th>Amount</th><th></th></tr>${rows}</table>`;
        }
        function renderUtil() {
            let rows = store.utilities.map((r,i)=>`<tr><td contenteditable="true" data-table="utilities" data-field="desc" data-row="${i}">${r.desc}</td><td class="amount-cell" contenteditable="true" data-table="utilities" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="utilities" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="utilities">➕ Add</button></div><table>${rows}</table>`;
        }
        function renderSalaries() {
            let rows = store.salaries.map((r,i)=>`<tr><td contenteditable="true" data-table="salaries" data-field="person" data-row="${i}">${r.person}</td><td class="amount-cell" contenteditable="true" data-table="salaries" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="salaries" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="salaries">➕ Add</button></div><table><tr><th>Person</th><th>Amount</th><th></th></tr>${rows}</table>`;
        }
        function renderCar() {
            let rows = store.car.map((r,i)=>`<tr><td contenteditable="true" data-table="car" data-field="desc" data-row="${i}">${r.desc}</td><td class="amount-cell" contenteditable="true" data-table="car" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="car" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="car">➕ Add</button></div><table>${rows}</table>`;
        }
        function renderPersonal(who) {
            let arr = store['personal'+who.charAt(0).toUpperCase()+who.slice(1)];
            let rows = arr.map((r,i)=>`<tr><td contenteditable="true" data-table="personal${who}" data-field="date" data-row="${i}">${r.date}</td><td contenteditable="true" data-table="personal${who}" data-field="desc" data-row="${i}">${r.desc}</td><td class="amount-cell" contenteditable="true" data-table="personal${who}" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="personal${who}" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="personal${who}">➕ Add</button></div><table><thead><tr><th>Date</th><th>Description</th><th>Amount</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
        }
        function renderFood() {
            let rows = store.pooledFood.map((r,i)=>`<tr><td contenteditable="true" data-table="pooledFood" data-field="date" data-row="${i}">${r.date}</td><td contenteditable="true" data-table="pooledFood" data-field="desc" data-row="${i}">${r.desc}</td><td class="amount-cell" contenteditable="true" data-table="pooledFood" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="pooledFood" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="pooledFood">➕ Add</button></div><table>${rows}</table>`;
        }
        function renderTrading() {
            let rows = store.trading.map((r,i)=>`<tr><td contenteditable="true" data-table="trading" data-field="desc" data-row="${i}">${r.desc}</td><td class="amount-cell" contenteditable="true" data-table="trading" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="trading" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="trading">➕ Add</button></div><table>${rows}</table>`;
        }
        function renderCapital() {
            let rows = store.capital.map((r,i)=>`<tr><td contenteditable="true" data-table="capital" data-field="partner" data-row="${i}">${r.partner}</td><td class="amount-cell" contenteditable="true" data-table="capital" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="capital" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="capital">➕ Add</button></div><table>${rows}</table>`;
        }

        // ---- event handlers ----
        function attachEvents() {
            document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                el.addEventListener('blur', function(e) {
                    let table = this.dataset.table;
                    let field = this.dataset.field;
                    let row = this.dataset.row;
                    if (table && field && row!==undefined && store[table] && store[table][row]) {
                        let val = this.innerText.trim();
                        if (field==='amount') val = parseFloat(val.replace(/[₨,\s]/g,'')) || 0;
                        store[table][row][field] = val;
                        localStorage.setItem('ledger13', JSON.stringify(store));
                        render(); // re-render to refresh totals
                    }
                });
            });
            document.querySelectorAll('[data-add]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let key = btn.dataset.add;
                    if (key === 'office') store.office.push({date:'', item:'', amount:0});
                    else if (key === 'rent') store.rent.push({period:'', amount:0});
                    else if (key === 'utilities') store.utilities.push({desc:'', amount:0});
                    else if (key === 'salaries') store.salaries.push({person:'', amount:0});
                    else if (key === 'car') store.car.push({desc:'', amount:0});
                    else if (key.includes('personal')) store[key].push({date:'', desc:'', amount:0});
                    else if (key === 'pooledFood') store.pooledFood.push({date:'', desc:'', amount:0});
                    else if (key === 'trading') store.trading.push({desc:'', amount:0});
                    else if (key === 'capital') store.capital.push({partner:'', amount:0});
                    localStorage.setItem('ledger13', JSON.stringify(store));
                    render();
                });
            });
            document.querySelectorAll('[data-delete]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let table = btn.dataset.delete;
                    let row = btn.dataset.row;
                    if (store[table]) store[table].splice(row,1);
                    localStorage.setItem('ledger13', JSON.stringify(store));
                    render();
                });
            });
        }

        function saveBlocksOnBlur() {
            let execFull = document.getElementById('execFullBlock');
            if(execFull) execFull.addEventListener('blur', function(){ store.execFull = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
            let hamm = document.getElementById('hammadBlock');
            if(hamm) hamm.addEventListener('blur', function(){ store.hammadText = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
            let settle = document.getElementById('settlementBlock');
            if(settle) settle.addEventListener('blur', function(){ store.settlementText = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
            let insight = document.getElementById('insightBlock');
            if(insight) insight.addEventListener('blur', function(){ store.insightText = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
            let confirm = document.getElementById('confirmBlock');
            if(confirm) confirm.addEventListener('blur', function(){ store.confirmText = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
        }

        // load from localStorage
        const saved = localStorage.getItem('ledger13');
        if (saved) { try { store = JSON.parse(saved); } catch(e) {} }
        else { localStorage.setItem('ledger13', JSON.stringify(store)); }

        render();
        window.addEventListener('beforeunload', ()=>localStorage.setItem('ledger13', JSON.stringify(store)));
    })();
</script>
</body>
</html>
