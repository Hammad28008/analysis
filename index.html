<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13‑month ledger · partner settlement</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f6f9fc;
            color: #172b3a;
            padding: 1rem 1.5rem;
        }
        .app {
            max-width: 1600px;
            margin: 0 auto;
        }
        /* STICKY EXECUTIVE SUMMARY PANEL */
        .executive-sticky {
            position: sticky;
            top: 0.75rem;
            z-index: 40;
            background: #ffffffec;
            backdrop-filter: blur(8px);
            border: 1px solid #dde7f0;
            border-radius: 2rem;
            padding: 1rem 2rem 1.2rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px -12px rgba(0,35,65,0.15);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 2rem 3rem;
        }
        .stat-badge {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #3f5e7c;
            letter-spacing: 0.3px;
        }
        .stat-value {
            font-size: 1.3rem;
            font-weight: 620;
            color: #0f2b40;
        }
        .conclusion-short {
            max-width: 400px;
            font-size: 0.9rem;
            border-left: 2px solid #6ba0d1;
            padding-left: 1.2rem;
            background: #f0f8ff;
            border-radius: 0 12px 12px 0;
            padding: 0.5rem 1.2rem;
        }
        /* LAYOUT */
        .grid-dash {
            display: flex;
            gap: 2rem;
        }
        .sidebar {
            width: 230px;
            flex-shrink: 0;
            background: white;
            border-radius: 30px;
            padding: 1.8rem 0.8rem;
            position: sticky;
            top: 6.5rem;
            height: fit-content;
            border: 1px solid #e3ecf5;
            box-shadow: 0 4px 14px rgba(0,20,40,0.02);
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.7rem 1.2rem;
            margin: 0.2rem 0.4rem;
            border-radius: 40px;
            color: #1f3f5c;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 460;
            transition: 0.1s;
        }
        .sidebar a:hover {
            background: #e3effa;
            color: #0b385b;
        }
        .main {
            flex: 1;
            min-width: 0;
        }
        section {
            scroll-margin-top: 6rem;
            background: white;
            border-radius: 28px;
            padding: 1.6rem 2rem;
            margin-bottom: 2.2rem;
            border: 1px solid #e3ebf3;
            box-shadow: 0 8px 22px -12px rgba(25, 60, 90, 0.12);
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 560;
            color: #103450;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #c9ddec;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        h3 {
            color: #1d4b6e;
            font-weight: 530;
            margin: 1.2rem 0 0.5rem 0;
            font-size: 1.1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }
        th {
            background: #e7f0f9;
            color: #113855;
            font-weight: 550;
            padding: 0.7rem 0.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        td {
            padding: 0.65rem 0.4rem;
            border-bottom: 1px solid #dde7f0;
            vertical-align: middle;
        }
        td[contenteditable="true"] {
            background: #fbfeff;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 0.2rem 0.3rem;
            outline: none;
        }
        td[contenteditable="true"]:focus {
            border-color: #3f8bcb;
            background: #ffffff;
        }
        select {
            width: 100%;
            border: 1px solid #cbdae9;
            border-radius: 14px;
            padding: 0.2rem 0.3rem;
            background: white;
        }
        .amount-cell {
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 470;
        }
        tfoot td {
            background: #f2f8ff;
            font-weight: 620;
            border-top: 2px solid #b9d1e7;
        }
        .table-toolbar {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-bottom: 0.8rem;
        }
        .btn-sm {
            background: white;
            border: 1px solid #b8cde0;
            border-radius: 40px;
            padding: 0.3rem 1.2rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-sm:hover {
            background: #e3f0fa;
            border-color: #6e9fd1;
        }
        .btn-icon {
            background: none;
            border: none;
            color: #46698b;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 0.3rem;
        }
        .btn-icon:hover {
            color: #bb2e2e;
        }
        .editable-block {
            background: #f7fcff;
            border: 1px dashed #8cb2d6;
            border-radius: 24px;
            padding: 1.2rem 1.8rem;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            margin: 1rem 0;
        }
        .total-badge {
            background: #e3effa;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            display: inline-block;
            font-size: 0.9rem;
            font-weight: 530;
        }
        .print-only { display: none; }
        @media print {
            .sidebar, .btn-sm, .btn-icon, .table-toolbar { display: none; }
            body { background: white; }
            .executive-sticky { border: 1px solid #aaa; box-shadow: none; }
            section { break-inside: avoid; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- sticky exec summary (updated via js) -->
    <div class="executive-sticky" id="stickyExec"></div>

    <div class="grid-dash">
        <!-- sidebar navigation -->
        <div class="sidebar print-hide">
            <a href="#exec">📋 1. Executive</a>
            <a href="#office">🪑 2. Office setup</a>
            <a href="#rentutil">🏢 3. Rent & util</a>
            <a href="#salaries">👥 4. Salaries</a>
            <a href="#car">🚗 5. Car expense</a>
            <a href="#personal">👤 6. Personal (A,S,H)</a>
            <a href="#hammad">🧑‍💼 7. Hammad cost</a>
            <a href="#food">🍲 8. Pooled food</a>
            <a href="#trading">📊 9. Trading</a>
            <a href="#capital">💰 10. Capital</a>
            <a href="#matrix">🔗 11. Accountability</a>
            <a href="#settlement">⚖️ 12. Settlement</a>
            <a href="#insight">💡 13. Core insight</a>
        </div>

        <!-- main dynamic content -->
        <div class="main" id="mainContent"></div>
    </div>
</div>

<script>
    (function() {
        // ---------- MASTER DATA (exact preload) ----------
        let store = {
            // editable executive block (section 1)
            execText: `Period: Jan-2025 to Feb-2026
Total inflow into system ≈ 6.0M–6.8M PKR
Core business operating cost ≈ 3.9M PKR
Non-business extraction ≈ 5.6M PKR

Conclusion:
The training business itself was profitable.
The deficit was created by personal withdrawals, vehicle cost, pooled living costs, and trading loss.

Primary capital provider: Hasan
Primary cash operator: Arslan
Secondary withdrawal: Shahzad
Employee: Hammad

Business owes Hasan.
Arslan and Shahzad owe business.`,

            // office setup
            office: [
                {date:'17-Jan-2025', item:'Office rent advance setup', amount:90500, category:'Office'},
                {date:'21-Jan-2025', item:'Table and chair', amount:81000, category:'Furniture'},
                {date:'27-Jan-2025', item:'Staff tables', amount:57000, category:'Furniture'},
                {date:'27-Jan-2025', item:'Fans', amount:20000, category:'Electrical'},
                {date:'10-Feb-2025', item:'Laptop', amount:95000, category:'IT'},
                {date:'10-Feb-2025', item:'Camera', amount:10000, category:'IT'},
                {date:'11-Feb-2025', item:'Opening items', amount:16800, category:'Setup'},
                {date:'11-Feb-2025', item:'Table materials', amount:3600, category:'Furniture'},
                {date:'12-Feb-2025', item:'Electrical items', amount:7300, category:'Electrical'},
                {date:'18-Feb-2025', item:'Glass partition', amount:180000, category:'Interior'},
                {date:'12-Mar-2025', item:'Projector', amount:70000, category:'IT'},
                {date:'04-Apr-2025', item:'Dispenser', amount:33000, category:'Equipment'},
                {date:'05-Apr-2025', item:'UPS battery', amount:38000, category:'Electrical'},
                {date:'06-Apr-2025', item:'Curtains', amount:12000, category:'Interior'},
                {date:'09-Apr-2025', item:'Systems LCD printer screen', amount:192000, category:'IT'},
                {date:'09-Apr-2025', item:'Standies stamp', amount:7000, category:'Branding'},
                {date:'12-Apr-2025', item:'Blinds', amount:25000, category:'Interior'},
                {date:'21-Apr-2025', item:'Sofa cupboard', amount:16500, category:'Furniture'},
                {date:'14-Oct-2025', item:'PC accessories', amount:10700, category:'IT'},
                {date:'08-Jan-2026', item:'UPS repair', amount:5000, category:'Repair'}
            ],

            // rent
            rent: [
                {date:'Jan-2025', desc:'Office rent', amount:90500},
                {date:'Feb-Apr bundle', desc:'bundle', amount:185000},
                {date:'May-Feb monthly avg total', desc:'avg total', amount:1300000}
            ],

            // utilities
            utilities: [
                {date:'period', type:'Electric + PTCL + Internet total', amount:450000}
            ],

            // salaries
            salaries: [
                {person:'Rida', role:'Salary', amount:220000},
                {person:'Office Boys', role:'Staff', amount:140000},
                {person:'Hammad', role:'Allowance', amount:120000}
            ],

            // car expense (summary preload, but we keep editable rows)
            car: [
                {desc:'Rameez installments', amount:520000},
                {desc:'Fuel cumulative', amount:420000},
                {desc:'Repairs + fines', amount:120000}
            ],

            // personal
            personalArslan: [
                {date:'10-Jan-2025', desc:'Arslan personal', amount:500000},
                {date:'05-Mar-2025', desc:'family', amount:300000},
                {date:'12-Jun-2025', desc:'travel', amount:200000},
            ], // sum 1M

            personalShahzad: [
                {date:'15-Feb-2025', desc:'Shahzad withdrawal', amount:200000},
                {date:'20-Apr-2025', desc:'personal', amount:120000},
            ], // 320k

            personalHasan: [
                {date:'08-Mar-2025', desc:'Hasan personal', amount:50000},
            ],

            // hammad policy text (section 7)
            hammadText: `Jan–Aug fuel allowance 6k/month
Sep–Feb food allowance 15k/month
Total expected ≈ 138k
Ledger ≈ 120k–140k

Conclusion: Hammad employee cost correct.`,

            // pooled food
            pooledFood: [
                {date:'03-Jan-2025', category:'staff meals', amount:120000},
                {date:'17-Feb-2025', category:'boys meals', amount:90000},
                {date:'22-Mar-2025', category:'tea/juice', amount:45000},
                {date:'11-Apr-2025', category:'guest food', amount:30000},
                {date:'09-May-2025', category:'staff meals', amount:115000},
                {date:'15-Jun-2025', category:'boys meals', amount:200000},
                {date:'12-Jul-2025', category:'guest', amount:60000},
                {date:'25-Aug-2025', category:'tea', amount:40000},
                {date:'30-Sep-2025', category:'staff', amount:180000},
                {date:'05-Oct-2025', category:'boys', amount:220000},
                {date:'12-Nov-2025', category:'juice', amount:50000},
                {date:'20-Dec-2025', category:'guest', amount:80000},
                {date:'10-Jan-2026', category:'staff', amount:70000},
            ], // total approx 1.4M

            // trading
            trading: [
                {date:'Exeness loss', type:'loss', amount:1500000, note:''},
                {date:'Later profits', type:'profit', amount:1200000, note:'entered pool'}
            ],

            // capital
            capital: [
                {partner:'Hasan', amount:2280000},
                {partner:'Arslan', amount:805000},
                {partner:'Shahzad', amount:560000}
            ],

            // matrix (static, but shown as table)
            // settlement direction text (section 12)
            settlementText: `Business owes Hasan large capital
Arslan owes business
Shahzad owes business
Hammad neutral`,

            // core insight text (section 13)
            insightText: `If personal withdrawals, vehicle, pooled food, and trading were separated:

Business retained profit ≈ 2M+

Deficit caused by withdrawal structure, not business failure.`
        };

        // ---------- helpers ----------
        function formatMoney(amt) {
            return '₨ ' + Number(amt).toLocaleString('en-PK', {maximumFractionDigits:0});
        }

        // compute totals for sticky summary
        function computeGrandTotals() {
            let officeSum = store.office.reduce((a,b)=>a+Number(b.amount),0);
            let rentSum = store.rent.reduce((a,b)=>a+Number(b.amount),0);
            let utilSum = store.utilities.reduce((a,b)=>a+Number(b.amount),0);
            let salarySum = store.salaries.reduce((a,b)=>a+Number(b.amount),0);
            let carSum = store.car.reduce((a,b)=>a+Number(b.amount),0);
            let arslanP = store.personalArslan.reduce((a,b)=>a+Number(b.amount),0);
            let shahzadP = store.personalShahzad.reduce((a,b)=>a+Number(b.amount),0);
            let hasanP = store.personalHasan.reduce((a,b)=>a+Number(b.amount),0);
            let foodSum = store.pooledFood.reduce((a,b)=>a+Number(b.amount),0);
            let tradingSum = store.trading.reduce((a,b)=>a+Number(b.amount),0);
            let capitalSum = store.capital.reduce((a,b)=>a+Number(b.amount),0);
            let personalTotal = arslanP + shahzadP + hasanP;
            return {officeSum, rentSum, utilSum, salarySum, carSum, arslanP, shahzadP, hasanP, foodSum, tradingSum, capitalSum, personalTotal};
        }

        function updateSticky() {
            let t = computeGrandTotals();
            let totalInflow = t.capitalSum; // approx
            let coreCost = t.rentSum + t.utilSum + t.salarySum;
            let nonBus = t.personalTotal;
            document.getElementById('stickyExec').innerHTML = `
                <div><span class="stat-badge">📅 Period</span><div class="stat-value">Jan25–Feb26</div></div>
                <div><span class="stat-badge">💰 Inflow</span><div class="stat-value">${formatMoney(totalInflow)}</div></div>
                <div><span class="stat-badge">🏭 Core cost</span><div class="stat-value">${formatMoney(coreCost)}</div></div>
                <div><span class="stat-badge">📤 Non‑bus extr</span><div class="stat-value">${formatMoney(nonBus)}</div></div>
                <div class="conclusion-short">Business profitable, deficit from withdrawals & car.</div>
                <button class="btn-sm" id="printBtn" style="margin-left:auto;">🖨️ PDF / Print</button>
            `;
            document.getElementById('printBtn')?.addEventListener('click', ()=>window.print());
        }

        // ---------- render entire app ----------
        function render() {
            let html = '';

            // 1 Executive (editable block)
            html += `<section id="exec"><h2>📋 1. Executive summary</h2>`;
            html += `<div class="editable-block" id="execBlock" contenteditable="true">${store.execText}</div></section>`;

            // 2 Office
            html += `<section id="office"><h2>🪑 2. Office setup & equipment</h2>${renderOffice()}</section>`;

            // 3 Rent & utilities
            html += `<section id="rentutil"><h2>🏢 3. Rent and utilities</h2><h3>Rent</h3>${renderRent()}<h3>Utilities</h3>${renderUtil()}`;
            let rentTot = store.rent.reduce((a,b)=>a+Number(b.amount),0);
            let utilTot = store.utilities.reduce((a,b)=>a+Number(b.amount),0);
            html += `<div class="total-badge">Rent total: ${formatMoney(rentTot)} | Utilities total: ${formatMoney(utilTot)} | Combined: ${formatMoney(rentTot+utilTot)}</div>`;
            html += `</section>`;

            // 4 Salaries
            html += `<section id="salaries"><h2>👥 4. Salaries & staff cost</h2>${renderSalaries()}</section>`;

            // 5 Car
            html += `<section id="car"><h2>🚗 5. Car expense</h2>${renderCar()}</section>`;

            // 6 Personal (three tables)
            html += `<section id="personal"><h2>👤 6. Personal expense by partner</h2>`;
            html += `<div style="display:flex; flex-wrap:wrap; gap:2rem;"><div><h3>Arslan</h3>${renderPersonal('arslan')}</div>`;
            html += `<div><h3>Shahzad</h3>${renderPersonal('shahzad')}</div>`;
            html += `<div><h3>Hasan</h3>${renderPersonal('hasan')}</div></div></section>`;

            // 7 Hammad
            html += `<section id="hammad"><h2>🧑‍💼 7. Hammad cost policy</h2>`;
            html += `<div class="editable-block" id="hammadBlock" contenteditable="true">${store.hammadText}</div></section>`;

            // 8 Pooled food
            html += `<section id="food"><h2>🍲 8. Pooled food & living</h2>${renderFood()}</section>`;

            // 9 Trading
            html += `<section id="trading"><h2>📊 9. Trading</h2>${renderTrading()}</section>`;

            // 10 Capital
            html += `<section id="capital"><h2>💰 10. Capital contribution</h2>${renderCapital()}</section>`;

            // 11 Accountability matrix (static but editable cells maybe)
            html += `<section id="matrix"><h2>🔗 11. Accountability matrix</h2>${renderMatrix()}</section>`;

            // 12 Settlement direction
            html += `<section id="settlement"><h2>⚖️ 12. Settlement direction</h2>`;
            html += `<div class="editable-block" id="settlementBlock" contenteditable="true">${store.settlementText}</div></section>`;

            // 13 Core insight
            html += `<section id="insight"><h2>💡 13. Core insight</h2>`;
            html += `<div class="editable-block" id="insightBlock" contenteditable="true">${store.insightText}</div></section>`;

            document.getElementById('mainContent').innerHTML = html;

            // attach events for editable tables (simplified via global listener)
            attachTableEvents();
            updateSticky();
            storeEditableBlocks();
        }

        // Table rendering helpers (simplified but functional)
        function renderOffice() {
            let rows = store.office.map((r,i) => `<tr>
                <td contenteditable="true" data-table="office" data-field="date" data-row="${i}">${r.date}</td>
                <td contenteditable="true" data-table="office" data-field="item" data-row="${i}">${r.item}</td>
                <td class="amount-cell" contenteditable="true" data-table="office" data-field="amount" data-row="${i}">${r.amount}</td>
                <td><select data-table="office" data-field="category" data-row="${i}">${['Office','Furniture','Electrical','IT','Setup','Interior','Equipment','Branding','Repair'].map(c=>`<option ${c==r.category?'selected':''}>${c}</option>`).join('')}</select></td>
                <td><button class="btn-icon" data-delete="office" data-row="${i}">🗑️</button></td>
            </tr>`).join('');
            let total = store.office.reduce((a,b)=>a+Number(b.amount),0);
            return `<div class="table-toolbar"><button class="btn-sm" data-add="office">➕ Add row</button></div>
            <table><thead><tr><th>Date</th><th>Item</th><th>Amount</th><th>Category</th><th></th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="2">Total</td><td class="amount-cell">${formatMoney(total)}</td><td></td><td></td></tr></tfoot></table>`;
        }

        function renderRent() {
            let rows = store.rent.map((r,i)=>`<tr><td contenteditable="true" data-table="rent" data-field="date" data-row="${i}">${r.date}</td><td contenteditable="true" data-table="rent" data-field="desc" data-row="${i}">${r.desc}</td><td class="amount-cell" contenteditable="true" data-table="rent" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="rent" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="rent">➕ Add rent</button></div><table>${rows}</table>`;
        }
        function renderUtil() {
            let rows = store.utilities.map((r,i)=>`<tr><td contenteditable="true" data-table="utilities" data-field="date" data-row="${i}">${r.date}</td><td contenteditable="true" data-table="utilities" data-field="type" data-row="${i}">${r.type}</td><td class="amount-cell" contenteditable="true" data-table="utilities" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="utilities" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="utilities">➕ Add util</button></table><table>${rows}</table>`;
        }
        function renderSalaries() {
            let rows = store.salaries.map((r,i)=>`<tr><td contenteditable="true" data-table="salaries" data-field="person" data-row="${i}">${r.person}</td><td contenteditable="true" data-table="salaries" data-field="role" data-row="${i}">${r.role}</td><td class="amount-cell" contenteditable="true" data-table="salaries" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="salaries" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="salaries">➕ Add salary</button></div><table>${rows}</table>`;
        }
        function renderCar() {
            let rows = store.car.map((r,i)=>`<tr><td contenteditable="true" data-table="car" data-field="desc" data-row="${i}">${r.desc}</td><td class="amount-cell" contenteditable="true" data-table="car" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="car" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="car">➕ Add row</button></div><table>${rows}</table>`;
        }
        function renderPersonal(who) {
            let arr = store['personal'+who.charAt(0).toUpperCase()+who.slice(1)];
            let rows = arr.map((r,i)=>`<tr><td contenteditable="true" data-table="personal${who}" data-field="date" data-row="${i}">${r.date}</td><td contenteditable="true" data-table="personal${who}" data-field="desc" data-row="${i}">${r.desc}</td><td class="amount-cell" contenteditable="true" data-table="personal${who}" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="personal${who}" data-row="${i}">🗑️</button></td></tr>`).join('');
            let total = arr.reduce((a,b)=>a+Number(b.amount),0);
            return `<div class="table-toolbar"><button class="btn-sm" data-add="personal${who}">➕ Add</button></div><table>${rows}<tfoot><tr><td colspan="2">Total</td><td class="amount-cell">${formatMoney(total)}</td><td></td></tr></tfoot></table>`;
        }
        function renderFood() {
            let rows = store.pooledFood.map((r,i)=>`<tr><td contenteditable="true" data-table="pooledFood" data-field="date" data-row="${i}">${r.date}</td><td contenteditable="true" data-table="pooledFood" data-field="category" data-row="${i}">${r.category}</td><td class="amount-cell" contenteditable="true" data-table="pooledFood" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="pooledFood" data-row="${i}">🗑️</button></td></tr>`).join('');
            let total = store.pooledFood.reduce((a,b)=>a+Number(b.amount),0);
            return `<div class="table-toolbar"><button class="btn-sm" data-add="pooledFood">➕ Add</button></div><table>${rows}<tfoot><tr><td colspan="2">Total ≈ 1.4M</td><td class="amount-cell">${formatMoney(total)}</td><td></td></tr></tfoot></table>`;
        }
        function renderTrading() {
            let rows = store.trading.map((r,i)=>`<tr><td contenteditable="true" data-table="trading" data-field="date" data-row="${i}">${r.date}</td><td contenteditable="true" data-table="trading" data-field="type" data-row="${i}">${r.type}</td><td class="amount-cell" contenteditable="true" data-table="trading" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="trading" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="trading">➕ Add</button></div><table>${rows}</table>`;
        }
        function renderCapital() {
            let rows = store.capital.map((r,i)=>`<tr><td contenteditable="true" data-table="capital" data-field="partner" data-row="${i}">${r.partner}</td><td class="amount-cell" contenteditable="true" data-table="capital" data-field="amount" data-row="${i}">${r.amount}</td><td><button class="btn-icon" data-delete="capital" data-row="${i}">🗑️</button></td></tr>`).join('');
            return `<div class="table-toolbar"><button class="btn-sm" data-add="capital">➕ Add</button></div><table>${rows}</table>`;
        }
        function renderMatrix() {
            const matrix = [
                ['Office setup','Hasan funded'],['Business rent utilities','Business'],['Salaries','Business'],
                ['Vehicle','Arslan'],['Trading loss','Arslan'],['Pooled food system','Arslan operated'],
                ['Shahzad personal','Shahzad'],['Arslan personal','Arslan'],['Hammad','Employee'],
                ['Capital provided','Hasan']
            ];
            return `<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px 20px; background:#f6faff; padding:1.4rem; border-radius:24px;">${
                matrix.map(m=>`<div><span style="font-weight:500;">${m[0]}</span> <span style="color:#0b4975;">— ${m[1]}</span></div>`).join('')
            }</div>`;
        }

        // event handling for add/delete/edits
        function attachTableEvents() {
            document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                el.addEventListener('blur', function(e) {
                    let table = this.dataset.table;
                    let field = this.dataset.field;
                    let row = this.dataset.row;
                    if (!table || row === undefined) return;
                    let val = this.innerText.trim();
                    if (field === 'amount') val = parseFloat(val.replace(/[₨,\s]/g,'')) || 0;
                    if (store[table] && store[table][row]) {
                        store[table][row][field] = val;
                        localStorage.setItem('ledger13', JSON.stringify(store));
                    }
                    render(); // re-render to reflect totals
                });
            });
            document.querySelectorAll('select').forEach(sel => {
                sel.addEventListener('change', function(e) {
                    let table = this.dataset.table;
                    let field = this.dataset.field;
                    let row = this.dataset.row;
                    if (store[table] && store[table][row]) {
                        store[table][row][field] = this.value;
                        localStorage.setItem('ledger13', JSON.stringify(store));
                        render();
                    }
                });
            });
            document.querySelectorAll('[data-add]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let table = btn.dataset.add;
                    let empty = {};
                    if (table === 'office') store.office.push({date:'', item:'', amount:0, category:'Office'});
                    else if (table === 'rent') store.rent.push({date:'', desc:'', amount:0});
                    else if (table === 'utilities') store.utilities.push({date:'', type:'', amount:0});
                    else if (table === 'salaries') store.salaries.push({person:'', role:'', amount:0});
                    else if (table === 'car') store.car.push({desc:'', amount:0});
                    else if (table.includes('personal')) {
                        let key = table; // personalArslan etc
                        store[key].push({date:'', desc:'', amount:0});
                    } else if (table === 'pooledFood') store.pooledFood.push({date:'', category:'', amount:0});
                    else if (table === 'trading') store.trading.push({date:'', type:'', amount:0});
                    else if (table === 'capital') store.capital.push({partner:'', amount:0});
                    localStorage.setItem('ledger13', JSON.stringify(store));
                    render();
                });
            });
            document.querySelectorAll('[data-delete]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let table = btn.dataset.delete;
                    let row = btn.dataset.row;
                    if (store[table]) store[table].splice(row,1);
                    localStorage.setItem('ledger13', JSON.stringify(store));
                    render();
                });
            });
        }

        function storeEditableBlocks() {
            let execBlk = document.getElementById('execBlock');
            if (execBlk) execBlk.addEventListener('blur', function(){ store.execText = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
            let hammBlk = document.getElementById('hammadBlock');
            if (hammBlk) hammBlk.addEventListener('blur', function(){ store.hammadText = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
            let settleBlk = document.getElementById('settlementBlock');
            if (settleBlk) settleBlk.addEventListener('blur', function(){ store.settlementText = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
            let insightBlk = document.getElementById('insightBlock');
            if (insightBlk) insightBlk.addEventListener('blur', function(){ store.insightText = this.innerText; localStorage.setItem('ledger13', JSON.stringify(store)); });
        }

        // Load from localStorage if available
        const saved = localStorage.getItem('ledger13');
        if (saved) {
            try { store = JSON.parse(saved); } catch(e) {}
        } else {
            localStorage.setItem('ledger13', JSON.stringify(store));
        }

        render();
        window.addEventListener('beforeunload', ()=>localStorage.setItem('ledger13', JSON.stringify(store)));
    })();
</script>
</body>
</html>
